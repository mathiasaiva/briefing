<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily World Briefing</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--ink:#e8eaed;--muted:#9aa3b2;--line:#2a303b;--accent:#6ea8fe}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
  .wrap{max-width:640px;margin:0 auto;padding:56px 22px 80px}
  h1{font-size:26px;margin:0 0 4px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin-bottom:28px}
  ul{list-style:none;padding:0;margin:0}
  li a{display:block;text-decoration:none;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:10px;font-size:16px}
  li a:hover{border-color:var(--accent)}
  li a:hover .arrow{color:var(--accent)}
  .arrow{float:right;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Daily World Briefing</h1>
  <div class="sub">Every edition, newest first.</div>
  <!-- BRIEFING_LINKS_START -->
  <ul>
    <li><a href="briefings/2026-07-08.html">July 8, 2026<span class="arrow">&rarr;</span></a></li>
    <li><a href="briefings/2026-07-07.html">July 7, 2026<span class="arrow">&rarr;</span></a></li>
  </ul>
  <!-- BRIEFING_LINKS_END -->
</div>
</body>
</html>
